<html lang="zh-CN">

    <meta charset="UTF-8" />

    <meta name="description" content="视觉设计师、AI设计师、品牌设计师谭鹏的个人作品集。" />
    <title>谭鹏 | Visual · AI · Brand Designer</title>
    <script>
      (() => {
        const fixImage = (image) => {
          const source = image.getAttribute("src");
          if (source === "/portrait.png" || (source && source.startsWith("/projects/"))) {
            image.setAttribute("src", "./" + source.slice(1));
          }
        };
        new MutationObserver((records) => {
          for (const record of records) {
            if (record.type === "attributes") fixImage(record.target);
            for (const node of record.addedNodes) {
              if (node.nodeType !== 1) continue;
              if (node.tagName === "IMG") fixImage(node);
              node.querySelectorAll?.("img").forEach(fixImage);
            }
          }
        }).observe(document.documentElement, {
          subtree: true,
          childList: true,
          attributes: true,
          attributeFilter: ["src"],
        });
      })();
    </script>
